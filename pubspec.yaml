name: danwise
description: Aplikasi Marketplace DanWise
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  http: ^1.1.0
  provider: ^6.0.5
  url_launcher: ^6.2.0
  shared_preferences: ^2.2.2
  image_picker: ^1.0.7  # Versi terbaru sudah support web
  intl: ^0.18.1
  google_maps_flutter: ^2.5.0
  geolocator: ^10.1.0
  flutter_rating_bar: ^4.0.1
  cached_network_image: ^3.3.0
  cupertino_icons: ^1.0.6
  flutter_map: ^8.3.1
  latlong2: ^0.10.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/logo/